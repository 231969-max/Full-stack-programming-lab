<!DOCTYPE html>
<html>
<head>
    <title>API Data Fetcher - Improved</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #loadMore {
            display: none;
        }

        #postContainer {
            margin-top: 20px;
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
        }

        .post {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            text-align: left;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
            transition: 0.3s;
            display: none;
        }

        .post:hover {
            transform: scale(1.02);
        }

        .post h3 {
            color: #007bff;
            margin: 0;
        }

        .post h4 {
            margin: 5px 0 10px 0;
            text-transform: capitalize;
        }

        .spinner {
            margin-top: 20px;
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>

<body>

<h2>API Data Fetcher</h2>

<button id="loadPosts">Load Posts</button>
<button id="loadMore">Load More</button>

<div id="postContainer"></div>
<div class="spinner" id="loadingText"></div>

<script>
$(document).ready(function(){

    let allPosts = [];
    let visibleCount = 0;
    const batchSize = 5;

    $("#loadPosts").click(function(){

        $("#loadingText").text("Loading posts...");
        $("#loadPosts").prop("disabled", true);

        $.get("https://jsonplaceholder.typicode.com/posts", function(data){

            allPosts = data;
            visibleCount = 0;

            $("#postContainer").empty();
            $("#loadingText").text("");
            $("#loadMore").show();

            loadNextBatch();
        });

    });

    function loadNextBatch(){

        let nextPosts = allPosts.slice(visibleCount, visibleCount + batchSize);

        $.each(nextPosts, function(index, post){

            let postCard = `
                <div class="post">
                    <h3>Post #${post.id}</h3>
                    <h4>${post.title}</h4>
                    <p>${post.body}</p>
                </div>
            `;

            $("#postContainer").append(postCard);
        });

        $(".post").slice(visibleCount, visibleCount + batchSize)
                  .fadeIn(500);

        visibleCount += batchSize;

        if(visibleCount >= allPosts.length){
            $("#loadMore").hide();
        }
    }

    $("#loadMore").click(function(){
        loadNextBatch();
    });

});
</script>

</body>
</html>
